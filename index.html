<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hex UTF-8 to Text</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111111'/%3E%3Cpath d='M18 22h28v6H18zm0 14h18v6H18z' fill='%23ffffff'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <h1>Hex UTF-8 to Text</h1>
          </div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon icon-sun" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2" />
              <path d="M12 20v2" />
              <path d="m4.93 4.93 1.41 1.41" />
              <path d="m17.66 17.66 1.41 1.41" />
              <path d="M2 12h2" />
              <path d="M20 12h2" />
              <path d="m6.34 17.66-1.41 1.41" />
              <path d="m19.07 4.93-1.41 1.41" />
            </svg>
            <svg class="icon icon-moon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </svg>
            <span class="sr-only">Toggle theme</span>
          </button>
        </div>
      </header>

      <section class="panel">
        <h2>Input</h2>
        <textarea id="hexInput" placeholder="Paste hex here" aria-label="Hex input"></textarea>
        <div class="actions">
          <label class="checkbox">
            <input id="autoFormat" type="checkbox" />
            <span>Format JSON</span>
          </label>
        </div>
      </section>

      <section class="panel output">
        <div class="output-header">
          <h2>Output</h2>
          
          <button id="copyBtn" class="ghost" aria-label="Copy output">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="8" y="8" width="14" height="14" rx="2" />
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
            <span class="sr-only">Copy output</span>
          </button>
        </div>
        <pre id="output" class="output-box" aria-live="polite"></pre>
      </section>

    </main>

    <footer class="site-footer">
      <div class="container">
        <div>Pluto Labs © 2026</div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
